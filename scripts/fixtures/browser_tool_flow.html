<!doctype html><html lang="en"><meta charset="utf-8"><title>Browser Tool Fixture</title><body><h1>Browser Tool Challenge</h1><p>Type <strong id="expected-code">ORBIT-42</strong> and click <strong>Reveal answer</strong>.</p><label>Challenge code <input id="challenge-input" autocomplete="off"></label><button id="reveal-btn" type="button" disabled>Reveal answer</button><p id="status">Waiting.</p><div id="result" hidden></div><script>const e="ORBIT-42",i=document.getElementById("challenge-input"),b=document.getElementById("reveal-btn"),s=document.getElementById("status"),r=document.getElementById("result");i.addEventListener("input",()=>{const ok=i.value.trim()===e;b.disabled=!ok;s.textContent=ok?"Ready to reveal.":"Waiting.";});b.addEventListener("click",()=>{r.textContent=["browser","smoke","token","42"].join("-");r.hidden=false;s.textContent="Answer revealed.";});</script>
