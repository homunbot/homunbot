<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Homun Mobile Mockup</title>
  <meta name="description" content="Homun mobile chat mockup in HTML, CSS and JavaScript.">
  <link rel="icon" href="../static/img/favicon/favicon-32x32.png" sizes="32x32" type="image/png">
  <link rel="stylesheet" href="./styles.css?v=20260312-2">
</head>
<body>
  <main class="workspace">
    <aside class="demo-panel" aria-label="Controlli demo">
      <div class="demo-panel__brand">
        <img class="demo-panel__logo" src="../static/img/homun.png" alt="Homun">
        <p class="demo-panel__copy">
          Mockup mobile light-first terracotta, focalizzato su chat, workflow e contesto operativo.
        </p>
      </div>

      <div class="demo-panel__content" id="demo-controls"></div>
    </aside>

    <section class="device-stage" aria-label="Anteprima app mobile">
      <div class="device-frame">
        <div class="device-frame__chrome">
          <span>9:41</span>
          <div class="device-frame__status" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
        <div class="device-notch" aria-hidden="true"></div>
        <div class="mobile-screen" id="app-root"></div>
      </div>
    </section>
  </main>

  <script src="./app.js?v=20260312-2"></script>
</body>
</html>
