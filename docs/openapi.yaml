openapi: 3.1.0
info:
  title: Homun API
  version: 0.1.0
  description: |
    Personal AI assistant API. Supports OpenAI-compatible chat completions,
    session management, and 50+ management endpoints.

    **Authentication**: Bearer token (`Authorization: Bearer wh_...`) or session cookie.
  license:
    name: MIT

servers:
  - url: https://localhost:18443/api
    description: Local development

security:
  - BearerAuth: []
  - SessionCookie: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Webhook token (wh_* prefix)
    SessionCookie:
      type: apiKey
      in: cookie
      name: homun_session

  schemas:
    ChatCompletionRequest:
      type: object
      required: [messages]
      properties:
        model:
          type: string
          description: Model name (informational — agent uses configured model)
          example: anthropic/claude-sonnet-4-20250514
        messages:
          type: array
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [system, user, assistant]
              content:
                type: string
        stream:
          type: boolean
          default: false
        max_tokens:
          type: integer
        temperature:
          type: number
        session_id:
          type: string
          description: Session ID for multi-turn conversations

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
          example: chatcmpl-abc123
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type: string
              finish_reason:
                type: string
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer

    Session:
      type: object
      properties:
        session_id:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        message_count:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string

  /v1/chat/completions:
    post:
      summary: Chat completions (OpenAI-compatible)
      description: |
        Send a message through the Homun agent loop. Supports streaming (SSE)
        and non-streaming responses. The agent has access to tools, memory,
        skills, and RAG knowledge.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                type: string
                description: SSE stream (when stream=true)
        '401':
          description: Authentication required
        '503':
          description: No agent available

  /v1/sessions:
    get:
      summary: List API sessions
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Session'
    post:
      summary: Create a new session
      responses:
        '200':
          description: Created session
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string

  /v1/sessions/{id}/messages:
    get:
      summary: Get session message history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message history
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        role:
                          type: string
                        content:
                          type: string
                        timestamp:
                          type: string

  /v1/sessions/{id}:
    delete:
      summary: Delete a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session deleted

  /v1/devices:
    get:
      summary: List trusted devices
      responses:
        '200':
          description: Device list

  /v1/devices/{id}/approve:
    post:
      summary: Approve a pending device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device approved

  /v1/devices/{id}:
    delete:
      summary: Revoke a trusted device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device revoked
