id = "google-workspace"
display_name = "Google Workspace"
subtitle = "Gmail, Calendar, and more"
icon = "google"
category = "Productivity"
auth_mode = "oauth"
capability_intro = "Access Gmail, Calendar, and other Google Workspace services"

[mcp]
command = "npx"
args = ["-y", "mcp-server-google-workspace"]
transport = "stdio"

[success]
title = "Google Workspace connected"
body = "You can now ask: Show me my unread emails / What meetings do I have today?"

[[fields]]
id = "client_id"
label = "Google Client ID"
help = "OAuth Client ID from Google Cloud Console"
secret = true
required = true
input = "text"
source_hint = "Google Cloud Console → APIs & Services → Credentials"
env_key = "GOOGLE_CLIENT_ID"

[[fields]]
id = "client_secret"
label = "Google Client Secret"
help = "OAuth Client Secret from Google Cloud Console"
secret = true
required = true
input = "password"
source_hint = "Google Cloud Console → APIs & Services → Credentials"
env_key = "GOOGLE_CLIENT_SECRET"

[[fields]]
id = "refresh_token"
label = "Google Refresh Token"
help = "OAuth Refresh Token obtained after authorization"
secret = true
required = true
input = "password"
source_hint = "Obtained via OAuth flow after granting access"
env_key = "GOOGLE_REFRESH_TOKEN"
