id = "linear"
display_name = "Linear"
subtitle = "Issues, projects, and cycles"
icon = "linear"
category = "Project Management"
auth_mode = "api_key"
capability_intro = "Manage Linear issues, projects, and track progress"

[mcp]
command = "npx"
args = ["-y", "mcp-server-linear"]
transport = "stdio"

[success]
title = "Linear connected"
body = "You can now ask: Show my assigned issues / Create a bug report for..."

[[fields]]
id = "api_key"
label = "Linear API Key"
help = "Personal API key for Linear access"
secret = true
required = true
input = "password"
source_hint = "Linear → Settings → API → Personal API keys"
env_key = "LINEAR_API_KEY"
