id = "linear"
display_name = "Linear"
subtitle = "Issues, projects, and cycles"
icon = "linear"
category = "Project Management"
auth_mode = "api_key"
capability_intro = "Manage Linear issues, projects, and track progress"
setup_guide = """
## How to get a Linear API Key

1. Open [linear.app](https://linear.app) and log in
2. Click your avatar (bottom-left) → **Settings**
3. Go to **API** in the sidebar
4. Under **Personal API keys**, click **Create key**
5. Give it a label (e.g. `Homun Assistant`)
6. Click **Create**
7. **Copy the key** — it's shown only once

### What the key can access
- Your issues, projects, and cycles
- Team information and labels
- Comments and attachments
- Roadmap and initiative data

> The API key gives access to everything in your Linear workspace that your account can see.
"""

[mcp]
command = "npx"
args = ["-y", "mcp-server-linear"]
transport = "stdio"

[success]
title = "Linear connected"
body = "You can now ask: Show my assigned issues / Create a bug report for..."

[[fields]]
id = "api_key"
label = "Linear API Key"
help = "Personal API key for Linear access"
secret = true
required = true
input = "password"
source_hint = "Linear → Settings → API → Personal API keys"
env_key = "LINEAR_ACCESS_TOKEN"
