id = "google-calendar"
display_name = "Google Calendar"
subtitle = "Read and manage your calendar events"
icon = "google-calendar"
category = "Productivity"
auth_mode = "oauth"
capability_intro = "View, create, and manage your calendar events"

[mcp]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-google-calendar"]
transport = "stdio"

[success]
title = "Google Calendar connected"
body = "You can now ask: What meetings do I have today?"

[[fields]]
id = "client_id"
label = "Google Client ID"
help = "OAuth Client ID from Google Cloud Console"
secret = true
required = true
input = "text"
source_hint = "Google Cloud Console → APIs & Services → Credentials"
env_key = "GOOGLE_CLIENT_ID"

[[fields]]
id = "client_secret"
label = "Google Client Secret"
help = "OAuth Client Secret from Google Cloud Console"
secret = true
required = true
input = "password"
source_hint = "Google Cloud Console → APIs & Services → Credentials"
env_key = "GOOGLE_CLIENT_SECRET"

[[fields]]
id = "refresh_token"
label = "Google Refresh Token"
help = "OAuth Refresh Token obtained after authorization"
secret = true
required = true
input = "password"
source_hint = "Obtained via OAuth flow after granting Calendar access"
env_key = "GOOGLE_REFRESH_TOKEN"
