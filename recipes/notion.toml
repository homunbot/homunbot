id = "notion"
display_name = "Notion"
subtitle = "Pages, databases, and workspace"
icon = "notion"
category = "Productivity"
auth_mode = "mcp_oauth"
capability_intro = "Access and manage your Notion pages and databases"

[mcp]
transport = "http"
url = "https://mcp.notion.com/mcp"
auth_env_key = "NOTION_TOKEN"

[success]
title = "Notion connected"
body = "You can now ask: Show me my recent Notion pages"

# Only a hidden token field — user never fills this manually.
# The MCP OAuth 2.1 flow (Dynamic Client Registration + PKCE) auto-fills it.

[[fields]]
id = "token"
label = "Notion Access Token"
help = "MCP OAuth access token (auto-filled)"
secret = true
required = true
input = "password"
env_key = "NOTION_TOKEN"
