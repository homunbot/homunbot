[package]
name = "homunbot"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
description = "Ultra-lightweight personal AI assistant — a digital homunculus in your computer"
license = "MIT"
repository = "https://github.com/homunbot/homunbot"
keywords = ["ai", "agent", "assistant", "bot", "skills"]
categories = ["command-line-utilities"]

[[bin]]
name = "homunbot"
path = "src/main.rs"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# HTTP
reqwest = { version = "0.12", features = ["json", "stream"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Skill frontmatter parsing
gray_matter = "0.2"

# Regex (shell safety filters)
regex = "1"

# Directories
dirs = "6"

# Archive extraction (skill installer)
flate2 = "1"
tar = "0.4"

# UUID for session/message IDs
uuid = { version = "1", features = ["v4"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Telegram bot
teloxide = { version = "0.13", features = ["macros"] }

# Discord bot
serenity = { version = "0.12", default-features = false, features = ["client", "gateway", "model", "cache", "rustls_backend"] }

# WhatsApp native client (Rust, no Node.js bridge)
whatsapp-rust = { path = "vendor/whatsapp-rust" }
whatsapp-rust-sqlite-storage = { path = "vendor/whatsapp-rust/storages/sqlite-storage" }
whatsapp-rust-tokio-transport = { path = "vendor/whatsapp-rust/transports/tokio-transport" }
whatsapp-rust-ureq-http-client = { path = "vendor/whatsapp-rust/http_clients/ureq-client" }
wacore = { path = "vendor/whatsapp-rust/wacore" }
waproto = { path = "vendor/whatsapp-rust/waproto" }
futures-util = "0.3"

# Streaming support
tokio-stream = "0.1"
eventsource-stream = "0.2"
pin-project-lite = "0.2"

# TUI (terminal user interface)
ratatui = "0.29"
crossterm = "0.28"

# MCP (Model Context Protocol) client
rmcp = { version = "0.15", features = ["client", "transport-child-process"] }

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
